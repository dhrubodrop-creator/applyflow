<!DOCTYPE html>
<html>
<head>
  <title>ApplyFlow Test</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 700px; margin:auto; }
    textarea, input { width: 100%; margin: 10px 0; padding: 10px; }
    button { padding: 10px 20px; cursor: pointer; }
    .job { border:1px solid #ccc; padding:10px; margin:10px 0; }
    .error { color: red; }
  </style>
</head>

<body>

<h2>ApplyFlow (Final Test)</h2>

<input id="email" placeholder="Enter email" />
<textarea id="cv" rows="6" placeholder="Paste your CV text here"></textarea>

<button onclick="submitCV()">Submit</button>

<p id="status"></p>
<div id="jobs"></div>

<script>
async function submitCV() {
  const status = document.getElementById("status");
  const jobsDiv = document.getElementById("jobs");

  status.innerText = "Loading...";
  jobsDiv.innerHTML = "";

  try {
    const res = await fetch("https://n8n-1-1msp.onrender.com/webhook/applyflow-inbound", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user_email: document.getElementById("email").value,
        cv_text: document.getElementById("cv").value,
        cv_link: ""
      })
    });

    const data = await res.json();

    console.log("RESPONSE:", data);

    // 🔴 CASE 1: backend still wrong
    if (!Array.isArray(data)) {
      status.innerHTML = "<span class='error'>Backend not returning jobs yet</span>";
      return;
    }

    // ✅ SUCCESS
    status.innerText = "Jobs found: " + data.length;

    jobsDiv.innerHTML = data.map(j => `
      <div class="job">
        <h3>${j.title}</h3>
        <p>${j.company} — ${j.location}</p>
        <a href="${j.apply_url}" target="_blank">Apply</a>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    status.innerHTML = "<span class='error'>Request failed (check CORS or backend)</span>";
  }
}
</script>

</body>
</html>
